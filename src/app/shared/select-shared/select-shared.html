<div class="relative">
  <div
    class="bg-slate-600 text-2xl leading-none h-9 flex items-center justify-center text-white cursor-pointer px-2"
    [class.opacity-50]="disabled"
    (click)="toggleOpen()"
  >
    <span class="inline-block leading-none">{{ value?.label ?? '—' }}</span>
  </div>
  @if (isOpen) {
    <div class="absolute top-8 left-0 bg-slate-600 text-white z-10">
      @for (option of options(); track option.value) {
        <button
          class="border-0 block w-full cursor-pointer hover:bg-slate-700 p-2"
          (click)="selectOption(option)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
